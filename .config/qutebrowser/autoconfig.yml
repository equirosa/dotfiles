# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/master/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  bindings.commands:
    global:
      normal:
        ',M': spawn xdg-open {url}
        ',Y': spawn watchlist {url}
        ',m': hint links spawn xdg-open {hint-url}
        ',y': hint links spawn watchlist {hint-url}
        zl: spawn --userscript qute-pass --mode gopass
        zol: spawn --userscript qute-pass --mode gopass --otp-only
  completion.web_history.max_items:
    global: 0
  content.autoplay:
    global: false
  content.cookies.accept:
    global: all
  content.headers.do_not_track:
    global: false
  content.host_blocking.lists:
    global:
    - https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/fakenews-gambling-porn/hosts
  content.javascript.enabled:
    global: true
  content.pdfjs:
    global: true
  content.proxy:
    global: system
  content.webgl:
    global: false
  downloads.remove_finished:
    global: -1
  spellcheck.languages:
    global:
    - en-US
    - es-ES
  tabs.background:
    global: true
  url.searchengines:
    global:
      DEFAULT: https://searx.neocities.org/?q={}
      a: https://wiki.archlinux.org/index.php?search={}
      aur: https://aur.archlinux.org/packages/?O=0&K={}
      d: https://duckduckgo.com/?q={}
      e: https://ecosia.org/search?q={}
      flathub: https://flathub.org/apps/search/{}
      gh: https://github.com/search?utf8=%E2%9C%93&q={}
      melpa: https://melpa.org/#/?q={}
      n: https://nixos.wiki/index.php?search={}&go=Go
      np: https://nixos.org/nixos/packages.html?channel=nixos-unstable&query={}
      p: https://www.protondb.com/search?q={}
      searx: https://searx.neocities.org/?q={}
      snap: https://snapcraft.io/search?q={}
      v: https://wiki.voidlinux.org/index.php?search={}
      w: https://en.wikipedia.org/w/index.php?search={}
  url.start_pages:
    global: https://searx.neocities.org
